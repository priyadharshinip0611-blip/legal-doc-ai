openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Legal Document Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      parameters:
        - in: query
          name: type
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload and create a document for analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Get dashboard stats
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Not found
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/{id}/analyze:
    post:
      operationId: analyzeDocument
      tags: [documents]
      summary: Trigger AI analysis of a document
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"


components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DocumentType:
      type: string
      enum:
        - contract
        - agreement
        - nda
        - lease
        - employment_agreement
        - partnership_agreement
        - other

    DocumentStatus:
      type: string
      enum:
        - pending
        - analyzing
        - completed
        - error

    LegalEntity:
      type: object
      properties:
        text:
          type: string
        type:
          type: string
          enum: [date, obligation, penalty, risk, party]
      required:
        - text
        - type

    ClauseSummary:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        originalText:
          type: ["string", "null"]
      required:
        - title
        - summary

    LegalAnalysis:
      type: object
      properties:
        parties:
          type: array
          items:
            type: string
        keyDates:
          type: array
          items:
            type: string
        clauseSummaries:
          type: array
          items:
            $ref: "#/components/schemas/ClauseSummary"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/LegalEntity"
        risks:
          type: array
          items:
            type: string
        obligations:
          type: array
          items:
            type: string
        penalties:
          type: array
          items:
            type: string
        summary:
          type: string
      required:
        - parties
        - keyDates
        - clauseSummaries
        - entities
        - risks
        - obligations
        - penalties
        - summary

    Document:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/DocumentType"
        status:
          $ref: "#/components/schemas/DocumentStatus"
        fileUrl:
          type: ["string", "null"]
        fileType:
          type: ["string", "null"]
        extractedText:
          type: ["string", "null"]
        analysis:
          oneOf:
            - $ref: "#/components/schemas/LegalAnalysis"
            - type: "null"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - type
        - status
        - createdAt
        - updatedAt

    DocumentInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/DocumentType"
        fileUrl:
          type: ["string", "null"]
        fileType:
          type: ["string", "null"]
        extractedText:
          type: ["string", "null"]
      required:
        - name
        - type

    DocumentStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        analyzing:
          type: integer
        pending:
          type: integer
        byType:
          type: object
          additionalProperties:
            type: integer
        recentDocuments:
          type: array
          items:
            $ref: "#/components/schemas/Document"
      required:
        - total
        - completed
        - analyzing
        - pending
        - byType
        - recentDocuments

    UploadResult:
      type: object
      properties:
        fileUrl:
          type: string
        fileType:
          type: string
        extractedText:
          type: ["string", "null"]
      required:
        - fileUrl
        - fileType
