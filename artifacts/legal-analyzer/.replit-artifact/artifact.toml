kind = "web"
previewPath = "/"
title = "Legal Document Analyzer"
version = "1.0.0"
id = "artifacts/legal-analyzer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23864

[services.development]
run = "pnpm --filter @workspace/legal-analyzer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/legal-analyzer", "run", "build" ]
publicDir = "artifacts/legal-analyzer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23864"
BASE_PATH = "/"
